services:
  blaze:
    build: .
    container_name: blaze
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=blaze_steam
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHANNEL=${TELEGRAM_CHANNEL:-}
    depends_on:
      - mongo
    restart: unless-stopped
  mongo:
    image: mongo:7
    container_name: blaze-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
volumes:
  mongo-data:
