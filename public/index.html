<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Blaze Steam GitDB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="eyebrow">Blaze module</div>
        <h1>Steam GitDB</h1>
        <p>Локальная база приложений Steam с почасовым обновлением и историей изменений как в Git.</p>
      </div>
      <div class="status" id="statusBadge">checking...</div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Синхронизация</h2>
        <p id="summary">Загружаю статус...</p>
        <button id="syncBtn">Обновить сейчас</button>
        <button id="statusBtn">Обновить статус</button>
        <pre id="debug"></pre>
      </div>

      <div class="card">
        <h2>Поиск игр</h2>
        <input id="search" placeholder="Название или appid">
        <button id="searchBtn">Найти</button>
        <div id="apps"></div>
      </div>

      <div class="card wide">
        <h2>История коммитов</h2>
        <div id="commits"></div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
